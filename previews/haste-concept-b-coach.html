<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haste · Concept B — Next-Tick Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary-bg:#0f1117;--card-bg:#1e2130;--surface-bg:#23263a;--hover-bg:#2a2d42;
  --accent:#7c3aed;--accent-hover:#8b5cf6;--accent-glow:rgba(124,58,237,.3);
  --success:#10b981;--warning:#f59e0b;--gold:#fbbf24;
  --text-primary:#fff;--text-secondary:#e5e7eb;--text-muted:#9ca3af;--text-accent:#a78bfa;
  --border:#2d3142;--border-hover:#3d4158;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:
  radial-gradient(1100px 500px at 15% -10%,rgba(16,185,129,.10),transparent 55%),
  radial-gradient(1100px 600px at 90% 0%,rgba(124,58,237,.16),transparent 60%),
  var(--primary-bg);color:var(--text-primary);min-height:100vh;padding:clamp(12px,3vw,40px)}
.wrap{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.tag{display:inline-block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent);
  background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);padding:5px 12px;border-radius:999px}
.topcard{background:linear-gradient(180deg,var(--card-bg),#171a26);border:1px solid var(--border);
  border-radius:20px;padding:clamp(16px,2.4vw,26px);display:flex;flex-wrap:wrap;align-items:center;gap:22px}
.rating-field{display:flex;flex-direction:column;gap:6px;min-width:150px}
.rating-field label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted)}
.rating-field input{background:var(--surface-bg);border:1px solid var(--border);border-radius:12px;color:#fff;
  font-size:28px;font-weight:800;padding:8px 14px;width:140px;outline:none}
.rating-field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
.eff{display:flex;flex-direction:column}
.eff .v{font-size:clamp(34px,5vw,48px);font-weight:900;background:linear-gradient(135deg,#a78bfa,#7c3aed);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.eff .l{font-size:12px;color:var(--text-muted)}
.loadout{display:flex;flex-direction:column;gap:8px;margin-left:auto}
.loadout .ll{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface-bg);border:1px solid var(--border);
  padding:7px 12px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);user-select:none;transition:.15s}
.chip:hover{border-color:var(--border-hover);background:var(--hover-bg)}
.chip.on{background:rgba(124,58,237,.18);border-color:var(--accent);color:#fff}
.chip .dot{width:9px;height:9px;border-radius:50%;background:#454a63}
.chip.on .dot{background:var(--accent-hover);box-shadow:0 0 8px var(--accent-hover)}
.gcdline{font-size:12px;color:var(--text-muted);flex-basis:100%}
.gcdline.warn{color:var(--warning);font-weight:600}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:820px){.cards{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,var(--card-bg),#171a26);border:1px solid var(--border);border-radius:18px;
  padding:20px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;transition:.2s}
.card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.card.best{border-color:var(--success);box-shadow:0 0 0 1px rgba(16,185,129,.4),0 18px 40px -20px rgba(16,185,129,.5)}
.card.best::before{content:"⭐ Cheapest next tick";position:absolute;top:0;left:0;right:0;font-size:11px;font-weight:700;
  letter-spacing:.08em;text-align:center;color:#04261a;background:var(--success);padding:5px}
.card.best .head{margin-top:22px}
.head{display:flex;align-items:center;gap:12px}
.head img{width:42px;height:42px;border-radius:10px;border:1px solid var(--border)}
.head .nm{font-weight:800;font-size:16px}
.head .tk{font-size:12px;color:var(--text-muted)}
.bigdelta{font-size:clamp(30px,5vw,40px);font-weight:900;line-height:1}
.bigdelta small{font-size:14px;font-weight:600;color:var(--text-muted)}
.delta-lbl{font-size:13px;color:var(--text-secondary);margin-top:-6px}
.prog{height:12px;border-radius:999px;background:#13151f;overflow:hidden;border:1px solid var(--border)}
.prog .f{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-hover));transition:width .3s}
.card.best .prog .f{background:linear-gradient(90deg,#0ea371,var(--success))}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.maxed{margin-top:auto;color:var(--success);font-weight:800;font-size:20px}
.cta{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:4px}
.cta a{display:inline-flex;align-items:center;gap:8px;background:rgba(124,58,237,.14);border:1px solid var(--accent);
  color:#cbb6ff;text-decoration:none;font-weight:700;font-size:14px;padding:11px 18px;border-radius:12px;transition:.15s}
.cta a:hover{background:var(--accent);color:#fff}
.note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div><span class="tag">Concept B · Next-Tick Coach</span></div>
  <section class="topcard">
    <div class="rating-field">
      <label>Haste Rating</label>
      <input id="rating" inputmode="numeric" pattern="[0-9]*" value="12562" maxlength="5">
    </div>
    <div class="eff">
      <div class="v" id="effOut">5.00%</div>
      <div class="l">effective haste · Shadowform</div>
    </div>
    <div class="loadout">
      <span class="ll">Loadout</span>
      <div class="chips" id="chips">
        <span class="chip" data-k="goblin"><i class="dot"></i>Goblin</span>
        <span class="chip" data-k="troll"><i class="dot"></i>Troll</span>
        <span class="chip" data-k="pi"><i class="dot"></i>Power Infusion</span>
        <span class="chip" data-k="bloodlust"><i class="dot"></i>Bloodlust</span>
        <span class="chip" data-k="spd"><i class="dot"></i>Sinister Primal</span>
        <span class="chip" data-k="berserking" style="display:none"><i class="dot"></i>Berserking</span>
      </div>
    </div>
    <div class="gcdline" id="gcdLine"></div>
  </section>
  <section class="cards" id="cards"></section>
  <div class="cta">
    <a href="https://wago.io/7m5gdIAts" target="_blank" rel="noopener">
      <img src="https://media.wago.io/favicon/favicon-32x32.png" alt="" width="18" height="18">Track in-game · Import WeakAura</a>
  </div>
  <p class="note">Concept preview · live calc shares the production breakpoint data &amp; formula.</p>
</div>
<script src="concept-core.js"></script>
<script>
const SHORT={"Shadow Word: Pain":"SW: Pain","Vampiric Touch":"Vampiric Touch","Devouring Plague":"Devouring Plague"};
let state={goblin:false,troll:false,pi:false,bloodlust:false,spd:false,berserking:false};
function render(){
  const rating=clampRating(document.getElementById('rating').value);
  const s=compute(rating,state);
  document.getElementById('effOut').textContent=s.eff.toFixed(2)+'%';
  const gl=document.getElementById('gcdLine');
  if(rating>=s.gcdCap){gl.textContent='⚠ GCD cap reached ('+s.gcdCap.toLocaleString()+') — haste no longer speeds casts but still buys DoT ticks.';gl.className='gcdline warn';}
  else{gl.textContent=(s.gcdCap-rating).toLocaleString()+' rating until the GCD cap ('+s.gcdCap.toLocaleString()+').';gl.className='gcdline';}
  const results=Object.keys(BREAKPOINTS).map(sp=>analyze(sp,s.eff,state.goblin,rating));
  let bestSpell=null,bestDelta=Infinity;
  results.forEach(r=>{if(!r.isMaxed&&r.ratingDelta<bestDelta){bestDelta=r.ratingDelta;bestSpell=r.spell;}});
  const c=document.getElementById('cards');c.innerHTML='';
  results.forEach(r=>{
    const isBest=r.spell===bestSpell&&!r.isMaxed;
    const body=r.isMaxed
      ? `<div class="maxed">✓ Maxed — ${r.ticksNow} bonus ticks</div>`
      : `<div class="bigdelta">+${r.ratingDelta.toLocaleString()}<small> rating</small></div>
         <div class="delta-lbl">→ +1 tick (reaches ${r.nextDisplayPct.toFixed(2)}%)</div>
         <div class="prog"><div class="f" style="width:${r.progress}%"></div></div>
         <div class="prog-meta"><span>${Math.round(r.progress)}% to next</span><span>${(r.baseTicks+r.ticksNow)} ticks now</span></div>`;
    c.insertAdjacentHTML('beforeend',`
      <div class="card ${isBest?'best':''}">
        <div class="head">
          <img src="${r.icon}" alt="">
          <div><div class="nm">${SHORT[r.spell]}</div><div class="tk">${r.baseTicks} base · +${r.ticksNow} bonus</div></div>
        </div>
        ${body}
      </div>`);
  });
}
document.getElementById('chips').addEventListener('click',e=>{
  const c=e.target.closest('.chip');if(!c)return;const k=c.dataset.k;state[k]=!state[k];
  if(k==='goblin'&&state.goblin){state.troll=false;state.berserking=false;}
  if(k==='troll'){if(state.troll)state.goblin=false;else state.berserking=false;}
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('on',!!state[ch.dataset.k]));
  document.querySelector('[data-k=berserking]').style.display=state.troll?'inline-flex':'none';
  render();
});
document.getElementById('rating').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,5);render();});
render();
</script>
</body>
</html>
